name: Fetch Stocks Diagnostic
on:
  workflow_dispatch: {}
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python fetch_stocks_diagnostic.py
        env:
          WB_TOKEN: ${{ secrets.WB_TOKEN }}
