name: Daily Update

on:
  schedule:
    - cron: '0 4 * * *'  # каждый день в 07:00 МСК (04:00 UTC)
  workflow_dispatch:
    inputs:
      orders_date_from:
        description: 'Заказы начиная с (YYYY-MM-DD), по умолчанию последние 7 дней'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests gspread google-auth
      - name: Run daily update
        env:
          PYTHONUNBUFFERED: "1"
          WB_TOKEN: ${{ secrets.WB_TOKEN }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          ORDERS_DATE_FROM: ${{ github.event.inputs.orders_date_from }}
        run: python daily_update.py
